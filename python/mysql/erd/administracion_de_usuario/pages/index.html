<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio de Sesión y Registro</title>
    <link rel="stylesheet" href="static/css/style.css">
</head>

<body>
    <div class="container">
        <div class="caja">
            <h1>Inicio de Sesión</h1>
            <div class="form-group">
                <label for="email">E-mail</label>
                <input type="text" id="email" name="email">
            </div>
            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password">
            </div>
            <button>Iniciar Sesión</button>
        </div>

        <div class="caja">
            <h1>Registro</h1>
            <div class="form-group">
                <label for="name">Nombre</label>
                <input type="text" id="name" name="name">
            </div>
            <div class="form-group">
                <label for="email-reg">E-mail</label>
                <input type="text" id="email-reg" name="email-reg">
            </div>
            <div class="form-group">
                <label for="password-reg">Contraseña</label>
                <input type="password" id="password-reg" name="password-reg">
            </div>
            <div class="form-group">
                <label for="confirm-password">Conf. Contraseña</label>
                <input type="password" id="confirm-password" name="confirm-password">
            </div>
            <button>Registrar</button>
        </div>
    </div>
</body>

</html>
